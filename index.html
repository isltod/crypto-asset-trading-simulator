<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Futures Chart</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <h1>Binance Futures</h1>
                <span class="badge">Virtual Trading</span>
            </div>
            <div class="controls">
                <div class="custom-select">
                    <select id="symbol-select">
                        <option value="BTCUSDT" selected>BTCUSDT</option>
                    </select>
                </div>

                <div class="input-container">
                    <div class="input-group">
                        <span class="label-text">Capital:</span>
                        <input type="number" id="capital-input" class="capital-input" value="100" min="0" step="10">
                        <span class="badge">USDT</span>
                    </div>

                    <div class="divider"></div>

                    <div class="input-group">
                        <span class="label-text">Leverage:</span>
                        <input type="number" id="leverage-input" class="leverage-input" value="1" min="1" max="100"
                            step="1">
                        <span class="badge">x</span>
                    </div>
                </div>

                <div class="input-container">
                    <div class="toggle-group">
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-tpsl">
                            <span class="slider"></span>
                            <span class="label-text">TPSL</span>
                        </label>
                    </div>

                    <div class="divider"></div>

                    <div class="input-group">
                        <span class="label-text">TP:</span>
                        <input type="number" id="tp-input" class="roi-input up" value="10" min="0" step="1">
                        <span class="badge">%</span>
                    </div>

                    <div class="divider"></div>

                    <div class="input-group">
                        <span class="label-text">SL:</span>
                        <input type="number" id="sl-input" class="roi-input down" value="-5" max="0" step="1">
                        <span class="badge">%</span>
                    </div>
                </div>

                <div class="indicator-toggles">
                    <div class="toggle-group">
                        <label class="toggle-switch">
                            <input type="checkbox" id="toggle-ma" checked>
                            <span class="slider"></span>
                            <span class="label-text">MA</span>
                        </label>
                        <input type="number" id="ma-length" class="length-input" value="20" min="1" max="200"
                            title="MA Length">
                    </div>

                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-bb">
                        <span class="slider"></span>
                        <span class="label-text">Bollinger Bands</span>
                    </label>
                </div>

                <div class="price-display">
                    <span id="current-price" class="price">Loading...</span>
                    <!-- 실시간 상승/하락 폭 표기 등을 위한 요소 -->
                    <span id="price-change" class="change"></span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="chart-container" class="chart-container"></div>

            <!-- Trade Panel Overlay -->
            <div id="trade-panel" class="trade-panel">
                <div class="panel-header">Trade Execution</div>
                <div class="order-buttons">
                    <button id="btn-long" class="btn btn-long">Long</button>
                    <button id="btn-short" class="btn btn-short">Short</button>
                </div>
                <!-- Active Position Info (Hidden until trade opens) -->
                <div id="active-position-info" class="position-info hidden">
                    <div class="pos-row"><span class="pos-label">Side:</span> <span id="pos-side"></span></div>
                    <div class="pos-row"><span class="pos-label">Entry:</span> <span id="pos-entry"></span></div>
                    <div class="pos-row"><span class="pos-label">Margin:</span> <span id="pos-margin"></span></div>
                    <div class="pos-row"><span class="pos-label">Size:</span> <span id="pos-size"></span></div>
                    <div class="pos-row"><span class="pos-label">Unrealized PnL:</span> <span id="pos-pnl"
                            class="pnl-val"></span></div>
                    <div class="pos-row"><span class="pos-label">ROE:</span> <span id="pos-roe" class="pnl-val"></span>
                    </div>
                    <button id="btn-close" class="btn btn-close">Close Position</button>
                </div>
            </div>
        </main>
    </div>

    <!-- TradingView Lightweight Charts 라이브러리 추가 -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <script src="app.js?v=5"></script>
</body>

</html>
